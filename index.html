<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Thông Tin Xe Điện | Yadea & VinFast</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --white:#FFFFFF; --black:#111111; --ink:#222222;
  --gray-700:#444444; --gray-500:#666666; --gray-300:#BBBBBB;
  --gray-100:#F2F2F2; --gray-50:#F8F8F8;
  --yadea:#FF5F00; --yadea-light:#FFF0E6; --yadea-mid:#FFD4B3;
  --vinfast:#1464f4; --vinfast-light:#EBF1FF; --vinfast-mid:#C5D7FD;
  --gold:#444444; --green:#222222;
  --border:#DDDDDD; --border-dark:#BBBBBB;
  --shadow-sm:0 1px 2px rgba(0,0,0,.06);
  --shadow-md:0 2px 8px rgba(0,0,0,.08);
  --shadow-lg:0 4px 16px rgba(0,0,0,.10);
  --radius:6px; --radius-sm:4px;
  --font-display:'Be Vietnam Pro',sans-serif;
  --font-body:'Be Vietnam Pro',sans-serif;
  --sidebar-w:240px;
  --toc-w:210px;
  --header-h:48px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:var(--font-body);background:var(--white);color:var(--ink);-webkit-font-smoothing:antialiased;overflow-x:hidden}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--gray-300);border-radius:2px}

/* ── TOPBAR ───────────────────────────────────── */
.topbar {
  position:fixed;top:0;left:0;right:0;z-index:200;
  height:var(--header-h);
  background:var(--white);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 1.25rem;gap:1rem;
}
.topbar-logo {
  font-family:var(--font-body);font-size:.92rem;font-weight:700;
  color:var(--black);cursor:pointer;white-space:nowrap;
  display:flex;align-items:center;gap:.5rem;text-decoration:none;
}
.topbar-logo span{
  font-size:.72rem;font-weight:400;color:var(--gray-500);
  padding-left:.75rem;border-left:1px solid var(--border);
}
.topbar-search{flex:1;max-width:280px;position:relative;margin-left:.75rem}
.search-input{
  width:100%;font-family:var(--font-body);font-size:.8rem;
  background:var(--gray-50);border:1px solid var(--border);
  color:var(--ink);border-radius:4px;
  padding:5px 12px 5px 32px;outline:none;transition:border-color .15s;
}
.search-input:focus{border-color:var(--black);background:var(--white)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--gray-500);font-size:.8rem;pointer-events:none}
.search-dropdown{
  position:absolute;top:calc(100% + 4px);left:0;right:0;min-width:300px;
  background:var(--white);border:1px solid var(--border);
  border-radius:4px;box-shadow:var(--shadow-lg);
  overflow:hidden;display:none;z-index:999;
}
.search-dropdown.open{display:block}
.sdrop-item{
  display:flex;align-items:center;gap:10px;
  padding:8px 12px;cursor:pointer;border-bottom:1px solid var(--gray-50);
  transition:background .1s;
}
.sdrop-item:hover{background:var(--gray-50)}
.sdrop-item:last-child{border:none}
.sdrop-brand{font-size:.6rem;font-weight:700;padding:2px 6px;border-radius:3px;white-space:nowrap;background:var(--gray-100);color:var(--gray-700)}
.sdrop-name{font-size:.82rem;font-weight:600;color:var(--black)}
.sdrop-meta{font-size:.68rem;color:var(--gray-500);margin-top:1px}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:.5rem}
.sidebar-toggle-btn{display:none;background:none;border:none;cursor:pointer;font-size:1rem;color:var(--gray-500);padding:6px}
@media(max-width:899px){.sidebar-toggle-btn{display:flex;align-items:center}}

/* ── LAYOUT ───────────────────────────────────── */
.layout{display:flex;padding-top:var(--header-h);min-height:100vh}

/* ── LEFT SIDEBAR ─────────────────────────────── */
.left-sidebar{
  width:var(--sidebar-w);flex-shrink:0;
  position:fixed;top:var(--header-h);left:0;bottom:0;
  background:var(--gray-50);border-right:1px solid var(--border);
  overflow-y:auto;z-index:100;transition:transform .25s ease;
}
.left-sidebar::-webkit-scrollbar{width:3px}
.sb-section{margin-bottom:0}
.sb-section-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:.5rem 1rem .4rem;cursor:pointer;
  font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;
  color:var(--gray-500);transition:color .1s;user-select:none;
  border-bottom:1px solid var(--border);
}
.sb-section-header:hover{color:var(--black)}
.sb-section-arrow{font-size:.55rem;transition:transform .2s;color:var(--gray-300)}
.sb-section.collapsed .sb-section-arrow{transform:rotate(-90deg)}
.sb-section.collapsed .sb-items{display:none}
.sb-brand-label{
  padding:.5rem 1rem .25rem;font-size:.62rem;font-weight:700;
  text-transform:uppercase;letter-spacing:.08em;color:var(--gray-500);
  border-bottom:1px solid var(--border);
}
.sb-item{
  display:flex;align-items:center;gap:.55rem;
  padding:.42rem 1rem .42rem 1.1rem;
  cursor:pointer;font-size:.8rem;color:var(--gray-700);
  transition:background .1s;border-left:2px solid transparent;
}
.sb-item:hover{background:var(--white);color:var(--black)}
.sb-item.active{background:var(--white);color:var(--black);font-weight:600;border-left-color:var(--black)}
.sb-item.yadea.active{border-left-color:var(--yadea);color:var(--yadea)}
.sb-item.vinfast.active{border-left-color:var(--vinfast);color:var(--vinfast)}
.sb-thumb{width:32px;height:24px;border-radius:3px;object-fit:contain;flex-shrink:0;background:var(--white);border:1px solid var(--border);padding:1px}
.sb-thumb-icon{font-size:1rem;flex-shrink:0;width:32px;text-align:center;opacity:.3}
.sb-item-info{flex:1;min-width:0}
.sb-item-name{font-size:.8rem;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-item-price{font-size:.63rem;color:var(--gray-500);margin-top:1px;font-weight:400}
.sb-home{
  display:flex;align-items:center;gap:.55rem;
  padding:.5rem 1rem;cursor:pointer;
  font-size:.82rem;font-weight:600;color:var(--gray-700);
  border-left:2px solid transparent;transition:all .1s;
  border-bottom:1px solid var(--border);
}
.sb-home:hover{background:var(--white);color:var(--black)}
.sb-home.active{color:var(--black);background:var(--white);border-left-color:var(--black)}

/* ── MAIN CONTENT ─────────────────────────────── */
.main-content{margin-left:var(--sidebar-w);flex:1;min-width:0;display:flex}
.content-area{flex:1;min-width:0;padding:2rem 2.5rem 4rem;max-width:820px}

/* ── RIGHT TOC ────────────────────────────────── */
.right-toc{
  width:var(--toc-w);flex-shrink:0;
  position:sticky;top:calc(var(--header-h) + 1.5rem);
  align-self:flex-start;padding:1.25rem 1rem 1rem .5rem;display:none;
}
@media(min-width:1180px){.right-toc{display:block}}
.toc-title{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--gray-500);margin-bottom:.6rem}
.toc-list{list-style:none;display:flex;flex-direction:column;gap:1px}
.toc-item{
  font-size:.75rem;color:var(--gray-500);
  padding:4px 0 4px 10px;border-left:2px solid var(--border);
  cursor:pointer;transition:all .1s;line-height:1.4;
}
.toc-item:hover{color:var(--black);border-left-color:var(--gray-300)}
.toc-item.active{color:var(--black);font-weight:600;border-left-color:var(--black)}

/* ── HOME PAGE ────────────────────────────────── */
.home-header{margin-bottom:2rem;padding-bottom:1.5rem;border-bottom:1px solid var(--border)}
.home-eyebrow{font-size:.65rem;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--gray-500);margin-bottom:.6rem;display:flex;align-items:center;gap:.4rem}
.home-eyebrow-dot{width:5px;height:5px;border-radius:50%;background:var(--gray-500)}
.home-title{font-size:1.6rem;font-weight:700;color:var(--black);margin-bottom:.5rem;line-height:1.2}
.home-desc{font-size:.86rem;color:var(--gray-500);line-height:1.7;max-width:520px}
.home-stats{display:flex;gap:1.75rem;margin-top:1.25rem;flex-wrap:wrap}
.hstat{padding-right:1.75rem;border-right:1px solid var(--border)}
.hstat:last-child{border:none}
.hstat-num{font-size:1.5rem;font-weight:700;color:var(--black);line-height:1}
.hstat-label{font-size:.62rem;color:var(--gray-500);text-transform:uppercase;letter-spacing:.08em;margin-top:.2rem}
.home-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:.85rem}
.home-card{
  background:var(--white);border:1px solid var(--border);
  border-radius:var(--radius);overflow:hidden;cursor:pointer;
  transition:border-color .15s, box-shadow .15s;
}
.home-card:hover{border-color:var(--gray-500);box-shadow:var(--shadow-sm)}
.home-card.yadea:hover{border-color:var(--yadea)}
.home-card.vinfast:hover{border-color:var(--vinfast)}
.hcard-img{height:130px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;background:var(--gray-50)}
.hcard-img img{width:100%;height:100%;object-fit:contain;padding:10px;transition:transform .3s}
.home-card:hover .hcard-img img{transform:scale(1.03)}
.hcard-img-icon{font-size:3.5rem;opacity:.12}
.hcard-badges{position:absolute;top:7px;left:7px;display:flex;gap:3px}
.hcard-body{padding:.85rem 1rem}
.hcard-brand-tag{font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:2px 6px;border-radius:3px;display:inline-block;margin-bottom:.35rem;background:var(--gray-100);color:var(--gray-700)}
.yadea .hcard-brand-tag{background:var(--yadea-light);color:var(--yadea)}
.vinfast .hcard-brand-tag{background:var(--vinfast-light);color:var(--vinfast)}
.hcard-name{font-size:.95rem;font-weight:700;color:var(--black);margin-bottom:.15rem}
.hcard-tagline{font-size:.72rem;color:var(--gray-500);margin-bottom:.65rem;line-height:1.4}
.hcard-price{font-size:.92rem;font-weight:700;color:var(--black);margin-bottom:.5rem}
.yadea .hcard-price{color:var(--yadea)}
.vinfast .hcard-price{color:var(--vinfast)}
.hcard-specs{display:flex;gap:.35rem;flex-wrap:wrap}
.hcard-spec{font-size:.63rem;background:var(--gray-100);border:1px solid var(--border);padding:2px 7px;border-radius:3px;color:var(--gray-700)}

/* ── DETAIL PAGE ──────────────────────────────── */
.breadcrumb{display:flex;align-items:center;gap:.4rem;font-size:.75rem;color:var(--gray-500);margin-bottom:1.5rem;flex-wrap:wrap}
.breadcrumb a{color:var(--gray-500);cursor:pointer;transition:color .1s}
.breadcrumb a:hover{color:var(--black)}
.breadcrumb-sep{color:var(--gray-300)}
.breadcrumb-current{color:var(--black);font-weight:600}
.detail-brand-row{display:flex;align-items:center;gap:.6rem;margin-bottom:.4rem;flex-wrap:wrap}
.d-series-tag{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;padding:2px 8px;border-radius:3px;background:var(--gray-100);color:var(--gray-700)}
.yadea .d-series-tag{background:var(--yadea-light);color:var(--yadea)}
.vinfast .d-series-tag{background:var(--vinfast-light);color:var(--vinfast)}
.d-badge{font-size:.58rem;font-weight:700;padding:2px 7px;border-radius:3px;text-transform:uppercase;background:var(--gray-100);color:var(--gray-700)}
.d-title{font-size:clamp(1.5rem,3vw,2rem);font-weight:700;line-height:1.15;color:var(--black);margin-bottom:.4rem}
.yadea .d-title{color:var(--yadea)}
.vinfast .d-title{color:var(--vinfast)}
.d-tagline{font-size:.88rem;color:var(--gray-500);line-height:1.6;margin-bottom:.85rem}
.d-desc{font-size:.84rem;color:var(--gray-700);line-height:1.75;margin-bottom:1.75rem;padding-bottom:1.75rem;border-bottom:1px solid var(--border)}

/* Media */
.d-media{background:var(--gray-50);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:1.75rem}
.d-media-img{height:240px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.d-media-img img{width:100%;height:100%;object-fit:contain;padding:20px;position:absolute;inset:0}
.d-media-img-icon{font-size:8rem;opacity:.08}
.d-colors-bar{border-top:1px solid var(--border);padding:.75rem 1rem;display:flex;align-items:center;gap:.85rem;flex-wrap:wrap}
.d-colors-label{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--gray-500);white-space:nowrap}
.color-swatches{display:flex;gap:.35rem;flex-wrap:wrap}
.cswatch{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s;box-shadow:0 1px 2px rgba(0,0,0,.15)}
.cswatch:hover,.cswatch.active{border-color:var(--black);transform:scale(1.15)}
.d-color-name{font-size:.7rem;color:var(--gray-500)}

/* Sections */
.d-section{margin-bottom:1.75rem}
.d-section-title{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--gray-500);margin-bottom:.85rem;padding-bottom:.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.4rem}

/* Highlights */
.highlights{display:flex;flex-direction:column;gap:.4rem}
.h-item{display:flex;align-items:flex-start;gap:.7rem;padding:.65rem .85rem;background:var(--gray-50);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:.82rem;line-height:1.55;color:var(--gray-700)}
.h-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:.45rem;background:var(--gray-500)}
.yadea .h-dot{background:var(--yadea)}
.vinfast .h-dot{background:var(--vinfast)}

/* Pros Cons */
.pros-cons{display:grid;grid-template-columns:1fr 1fr;gap:.65rem}
@media(max-width:600px){.pros-cons{grid-template-columns:1fr}}
.pc-box{background:var(--gray-50);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.85rem .95rem}
.pc-title{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.5rem;color:var(--gray-700)}
.pc-list{list-style:none;display:flex;flex-direction:column;gap:.3rem}
.pc-list li{font-size:.8rem;color:var(--gray-700);padding-left:.9rem;position:relative;line-height:1.4}
.pc-list.pros li::before{content:'✓';position:absolute;left:0;color:var(--black);font-weight:700}
.pc-list.cons li::before{content:'×';position:absolute;left:0;color:var(--gray-500)}

/* Spec tabs */
.spec-tabs{display:flex;gap:3px;margin-bottom:.85rem;flex-wrap:wrap}
.spec-tab{font-family:var(--font-body);font-size:.72rem;font-weight:500;padding:4px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--white);color:var(--gray-500);cursor:pointer;transition:all .15s}
.spec-tab:hover{color:var(--black);background:var(--gray-50)}
.spec-tab.active{background:var(--black);color:var(--white);border-color:var(--black)}
.specs-panel{display:none}
.specs-panel.active{display:block}
.specs-table{width:100%;border-collapse:collapse}
.specs-table tr{border-bottom:1px solid var(--gray-100)}
.specs-table tr:last-child{border:none}
.specs-table tr:hover td{background:var(--gray-50)}
.specs-table td{padding:.5rem .65rem;font-size:.8rem}
.specs-table td:first-child{color:var(--gray-500);width:55%}
.specs-table td:last-child{font-weight:600;color:var(--black);text-align:right}
.spec-null{color:var(--gray-300)!important;font-style:italic;font-weight:400!important}
.spec-true{color:var(--black);font-weight:700!important}
.spec-false{color:var(--gray-400)}

/* Price card */
.d-price-card{background:var(--gray-50);border:1px solid var(--border);border-radius:var(--radius);padding:1.1rem 1.2rem;margin-bottom:1rem}
.d-price{font-size:1.5rem;font-weight:700;color:var(--black);line-height:1;margin-bottom:.2rem}
.yadea .d-price{color:var(--yadea)}
.vinfast .d-price{color:var(--vinfast)}
.d-price-note{font-size:.68rem;color:var(--gray-500);margin-bottom:.85rem}
.d-price-variants{display:flex;flex-direction:column;gap:.35rem;margin-bottom:.85rem}
.d-variant{display:flex;justify-content:space-between;align-items:center;padding:.45rem .65rem;background:var(--white);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:.76rem}
.d-variant-name{color:var(--gray-700)}
.d-variant-price{font-weight:700;color:var(--black)}
.d-quick-specs{display:flex;flex-direction:column;gap:.3rem}
.dqs-row{display:flex;align-items:center;justify-content:space-between;padding:.4rem .65rem;background:var(--white);border:1px solid var(--border);border-radius:var(--radius-sm)}
.dqs-label{font-size:.68rem;color:var(--gray-500)}
.dqs-val{font-size:.78rem;font-weight:700;color:var(--black)}
.d-warranty-card{background:var(--gray-50);border:1px solid var(--border);border-radius:var(--radius);padding:.9rem 1.1rem;margin-top:.75rem}
.d-warranty-title{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--gray-500);margin-bottom:.5rem}
.d-warranty-row{display:flex;justify-content:space-between;padding:.32rem 0;border-bottom:1px solid var(--border);font-size:.76rem}
.d-warranty-row:last-child{border:none}
.d-warranty-row span:first-child{color:var(--gray-500)}
.d-warranty-row span:last-child{font-weight:600;color:var(--black)}

/* nav prev/next */
.d-nav{display:flex;justify-content:space-between;gap:.75rem;margin-top:2.5rem;padding-top:1.25rem;border-top:1px solid var(--border)}
.d-nav-btn{font-family:var(--font-body);font-size:.76rem;font-weight:500;padding:7px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--white);color:var(--gray-700);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:.4rem;max-width:48%}
.d-nav-btn:hover{border-color:var(--black);color:var(--black)}
.d-nav-btn.next{margin-left:auto}

/* BADGES */
.vbadge{font-size:.58rem;font-weight:700;padding:2px 6px;border-radius:3px;text-transform:uppercase;background:var(--gray-200);color:var(--gray-700)}
.vbadge-new,.vbadge-hot,.vbadge-flagship,.vbadge-bestseller,.vbadge-default{background:var(--gray-100);color:var(--gray-700);border:1px solid var(--border)}

/* RESPONSIVE */
@media(max-width:899px){
  .left-sidebar{transform:translateX(-100%)}
  .left-sidebar.open{transform:translateX(0)}
  .main-content{margin-left:0}
  .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.25);z-index:99}
  .sidebar-overlay.open{display:block}
}
@media(max-width:600px){
  .content-area{padding:1.25rem 1rem 3rem}
}

@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.fade-in{animation:fadeIn .25s ease both}
</style>
</head>
<body>

<!-- OVERLAY mobile -->
<div class="sidebar-overlay" id="sbOverlay" onclick="closeSidebar()"></div>

<!-- TOPBAR -->
<header class="topbar">
  <button class="sidebar-toggle-btn" onclick="toggleSidebar()">☰</button>
  <a class="topbar-logo" onclick="showHome()">
    Thông Tin Xe Điện
    <span>Yadea & VinFast</span>
  </a>
  <div class="topbar-search">
    <span class="search-icon">⌕</span>
    <input class="search-input" id="searchInput" type="text" placeholder="Tìm xe..." autocomplete="off">
    <div class="search-dropdown" id="searchDrop"></div>
  </div>
</header>

<!-- LAYOUT -->
<div class="layout">

  <!-- LEFT SIDEBAR -->
  <aside class="left-sidebar" id="leftSidebar">
    <div class="sb-home active" id="sb-home" onclick="showHome();closeSidebar()">
      🏠 <span>Trang chủ</span>
    </div>
    <div id="sbContent"></div>
  </aside>

  <!-- MAIN -->
  <div class="main-content">

    <!-- CONTENT AREA -->
    <div class="content-area">

      <!-- HOME PAGE -->
      <div id="page-home" class="fade-in">
        <div class="home-header">
          <div class="home-eyebrow"><span class="home-eyebrow-dot"></span> Cập nhật 2024 – 2026</div>
          <h1 class="home-title">Thông Tin<br>Xe Điện Việt Nam</h1>
          <p class="home-desc">Tra cứu đầy đủ thông số kỹ thuật, giá bán và tính năng của tất cả mẫu xe điện Yadea và VinFast. Dữ liệu chuẩn, luôn được cập nhật.</p>
          <div class="home-stats" id="homeStats"></div>
        </div>
        <div class="home-grid" id="homeGrid"></div>
      </div>

      <!-- DETAIL PAGE -->
      <div id="page-detail" style="display:none">
        <div class="breadcrumb" id="breadcrumb"></div>
        <div id="detailContent"></div>
      </div>

    </div>

    <!-- RIGHT TOC -->
    <div class="right-toc" id="rightToc">
      <div class="toc-title">📌 Trên trang này</div>
      <ul class="toc-list" id="tocList"></ul>
    </div>

  </div>
</div>

<script>
const DB_URL = 'data/vehicles.json';
let DB = null;
let currentId = null;

async function loadData() {
  try {
    const r = await fetch(DB_URL);
    DB = await r.json();
  } catch(e) { DB = DEMO_DATA }
  init();
}

function init() {
  renderSidebar();
  renderHome();
  initSearch();
}

// ── FORMAT ──────────────────────────────────────
function fmtPrice(n) {
  if (!n) return '—';
  return new Intl.NumberFormat('vi-VN').format(n) + ' ₫';
}
function fmtM(n) {
  if (!n) return '—';
  return (n/1000000).toFixed(1).replace('.0','') + ' triệu';
}
function fmtVal(f) {
  if (f.value===null||f.value===undefined) return '<span class="spec-null">—</span>';
  if (typeof f.value==='boolean')
    return f.value ? '<span class="spec-true">✓ Có</span>' : '<span class="spec-false">Không</span>';
  return `${f.value}${f.unit?' '+f.unit:''}`;
}
function badgeClass(b) {
  const m = b.toLowerCase();
  if (m.includes('chạy')||m.includes('best')) return 'vbadge-bestseller';
  if (m.includes('flagship')||m.includes('cao cấp')) return 'vbadge-flagship';
  if (m.match(/20\d\d/)||m.includes('mới')) return 'vbadge-new';
  return 'vbadge-default';
}

// ── SIDEBAR ──────────────────────────────────────
function renderSidebar() {
  const brands = {};
  DB.vehicles.forEach(v => {
    if (!brands[v.brand]) brands[v.brand] = [];
    brands[v.brand].push(v);
  });
  let html = '';
  Object.entries(brands).forEach(([brand, vehicles]) => {
    html += `<div class="sb-section">
      <div class="sb-section-header" onclick="toggleSection(this)">
        ${DB.brands[brand]?.name||brand} <span class="sb-section-arrow">▼</span>
      </div>
      <div class="sb-items">
        <div class="sb-brand-label ${brand}">${DB.brands[brand]?.name||brand}</div>
        ${vehicles.map(v=>`
          <div class="sb-item ${brand}" id="sb-${v.id}" onclick="showDetail('${v.id}');closeSidebar()">
            ${v.images?.main
              ? `<img class="sb-thumb" src="${v.images.main}" alt="${v.name}" onerror="this.style.display='none'">`
              : `<span class="sb-thumb-icon">🛵</span>`}
            <div class="sb-item-info">
              <div class="sb-item-name">${v.fullName}</div>
              <div class="sb-item-price">từ ${fmtM(v.pricing?.base)}</div>
            </div>
          </div>`).join('')}
      </div>
    </div>`;
  });
  document.getElementById('sbContent').innerHTML = html;
}

function toggleSection(el) {
  el.closest('.sb-section').classList.toggle('collapsed');
}

function setActiveSidebar(id) {
  document.querySelectorAll('.sb-item,.sb-home').forEach(el=>el.classList.remove('active'));
  const target = document.getElementById('sb-'+(id||'home'));
  if (target) target.classList.add('active');
}

// ── HOME ─────────────────────────────────────────
function renderHome() {
  const total   = DB.vehicles.length;
  const yadea   = DB.vehicles.filter(v=>v.brand==='yadea').length;
  const vinfast = DB.vehicles.filter(v=>v.brand==='vinfast').length;

  document.getElementById('homeStats').innerHTML = `
    <div class="hstat"><div class="hstat-num" style="color:var(--yadea)">${yadea}</div><div class="hstat-label">Mẫu Yadea</div></div>
    <div class="hstat"><div class="hstat-num" style="color:var(--vinfast)">${vinfast}</div><div class="hstat-label">Mẫu VinFast</div></div>
    <div class="hstat"><div class="hstat-num">${total}</div><div class="hstat-label">Tổng mẫu xe</div></div>
  `;

  document.getElementById('homeGrid').innerHTML = DB.vehicles.map(v => {
    const pf = v.specs.performance.fields;
    const bt = v.specs.battery.fields;
    return `
    <div class="home-card ${v.brand} fade-in" onclick="showDetail('${v.id}')">
      <div class="hcard-img">
        ${v.images?.main
          ? `<img src="${v.images.main}" alt="${v.fullName}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
          : ''}
        <div class="hcard-img-icon" style="${v.images?.main?'display:none':''}">🛵</div>
        <div class="hcard-badges">${(v.badges||[]).map(b=>`<span class="vbadge ${badgeClass(b)}">${b}</span>`).join('')}</div>
      </div>
      <div class="hcard-body">
        <span class="hcard-brand-tag">${v.brand.toUpperCase()}</span>
        <div class="hcard-name">${v.fullName}</div>
        <div class="hcard-tagline">${v.tagline}</div>
        <div class="hcard-price">${fmtPrice(v.pricing?.base)}</div>
        <div class="hcard-specs">
          <span class="hcard-spec">⚡ ${pf.topSpeed?.value||'—'}km/h</span>
          <span class="hcard-spec">📏 ${pf.range?.value||'—'}km</span>
          <span class="hcard-spec">🔋 ${bt.voltage?.value||'—'}V</span>
          ${v.specs.features.fields.esim?.value ? '<span class="hcard-spec">📶 eSIM</span>' : ''}
          ${v.specs.features.fields.gps?.value  ? '<span class="hcard-spec">🗺 GPS</span>'  : ''}
        </div>
      </div>
    </div>`;
  }).join('');
}

function showHome() {
  currentId = null;
  document.getElementById('page-home').style.display = 'block';
  document.getElementById('page-detail').style.display = 'none';
  setActiveSidebar(null);
  renderToc([]);
  window.scrollTo(0,0);
}

// ── DETAIL ───────────────────────────────────────
function showDetail(id) {
  const v = DB.vehicles.find(x=>x.id===id);
  if (!v) return;
  currentId = id;
  const brand = DB.brands[v.brand];
  const ac    = brand.accentColor;
  const pf    = v.specs.performance.fields;
  const bt    = v.specs.battery.fields;
  const dim   = v.specs.dimensions.fields;
  const war   = v.specs.warranty.fields;
  const ft    = v.specs.features.fields;

  document.getElementById('page-home').style.display   = 'none';
  document.getElementById('page-detail').style.display = 'block';
  setActiveSidebar(id);
  window.scrollTo(0,0);

  // Breadcrumb
  document.getElementById('breadcrumb').innerHTML = `
    <a onclick="showHome()">🏠 Trang chủ</a>
    <span class="breadcrumb-sep">›</span>
    <a onclick="showHome()">${brand.name}</a>
    <span class="breadcrumb-sep">›</span>
    <span class="breadcrumb-current">${v.fullName}</span>
  `;

  // Spec tabs
  const specSections = Object.entries(v.specs);
  const tabsHTML = specSections.map(([k,s],i)=>
    `<button class="spec-tab ${i===0?'active':''}" id="tab-${k}" onclick="switchTab('${k}')">${s.label}</button>`
  ).join('');
  const panelsHTML = specSections.map(([k,s],i)=>`
    <div class="specs-panel ${i===0?'active':''}" id="panel-${k}">
      <table class="specs-table">
        ${Object.values(s.fields).map(f=>`<tr><td>${f.label}</td><td>${fmtVal(f)}</td></tr>`).join('')}
      </table>
    </div>`).join('');

  // Variants
  const variantsHTML = (v.pricing?.variants||[]).length > 1
    ? `<div class="d-price-variants">
        ${v.pricing.variants.map(vr=>`
          <div class="d-variant">
            <span class="d-variant-name">${vr.name}</span>
            <span class="d-variant-price">${fmtPrice(vr.price)}</span>
          </div>`).join('')}
       </div>`
    : '';

  document.getElementById('detailContent').innerHTML = `
  <div class="${v.brand} fade-in">
    <div class="detail-brand-row">
      <span class="d-series-tag" style="background:${ac}18;color:${ac}">${v.brand.toUpperCase()} · ${v.series}</span>
      ${(v.badges||[]).map(b=>`<span class="vbadge ${badgeClass(b)}">${b}</span>`).join('')}
    </div>
    <h1 class="d-title" id="sec-overview" style="color:${ac}">${v.fullName}</h1>
    <p class="d-tagline">${v.tagline}</p>
    <p class="d-desc">${v.description}</p>

    <!-- Price card inline on mobile -->
    <div class="d-price-card" style="display:none" id="mobile-price">
      <div class="d-price">${fmtPrice(v.pricing?.base)}</div>
      <div class="d-price-note">${v.pricing?.note||'Giá tham khảo'}</div>
      ${variantsHTML}
    </div>

    <div class="d-media ${v.brand}">
      <div class="d-media-img">
        ${v.images?.main ? `<img src="${v.images.main}" alt="${v.fullName}" onerror="this.style.display='none'">` : ''}
        <span class="d-media-img-icon">🛵</span>
      </div>
      ${(v.images?.colors||[]).length ? `
      <div class="d-colors-bar">
        <span class="d-colors-label">Màu sắc</span>
        <div class="color-swatches">
          ${v.images.colors.map((c,i)=>`<div class="cswatch ${i===0?'active':''}" style="background:${c.hex}" title="${c.name}" onclick="pickColor(this,'${c.name}')"></div>`).join('')}
        </div>
        <span class="d-color-name" id="colorName">${v.images.colors[0]?.name||''}</span>
      </div>` : ''}
    </div>

    <div class="d-section">
      <div class="d-section-title" id="sec-highlights">✨ Tính năng nổi bật</div>
      <div class="highlights ${v.brand}">
        ${(v.highlights||[]).map(h=>`<div class="h-item"><span class="h-dot"></span><span>${h}</span></div>`).join('')}
      </div>
    </div>

    ${(v.pros?.length||v.cons?.length)?`
    <div class="d-section">
      <div class="d-section-title" id="sec-proscons">👍 Ưu & Nhược điểm</div>
      <div class="pros-cons">
        <div class="pc-box"><div class="pc-title pros">Ưu điểm</div><ul class="pc-list pros">${(v.pros||[]).map(p=>`<li>${p}</li>`).join('')}</ul></div>
        <div class="pc-box"><div class="pc-title cons">Nhược điểm</div><ul class="pc-list cons">${(v.cons||[]).map(c=>`<li>${c}</li>`).join('')}</ul></div>
      </div>
    </div>`:''}

    <div class="d-section">
      <div class="d-section-title" id="sec-specs">🔧 Thông số kỹ thuật</div>
      <div class="spec-tabs">${tabsHTML}</div>
      <div>${panelsHTML}</div>
    </div>

    ${buildNavButtons(id)}
  </div>`;

  // Render right sidebar price info
  const toc = [
    {id:'sec-overview',  label:'Tổng quan'},
    {id:'sec-highlights',label:'Tính năng nổi bật'},
    {id:'sec-proscons',  label:'Ưu & Nhược điểm'},
    {id:'sec-specs',     label:'Thông số kỹ thuật'},
  ];
  renderToc(toc, v, ac, variantsHTML, pf, bt, dim, ft, war);
}

function buildNavButtons(currentId) {
  const list = DB.vehicles;
  const idx  = list.findIndex(v=>v.id===currentId);
  const prev = idx > 0 ? list[idx-1] : null;
  const next  = idx < list.length-1 ? list[idx+1] : null;
  return `<div class="d-nav">
    ${prev ? `<button class="d-nav-btn" onclick="showDetail('${prev.id}')">← ${prev.fullName}</button>` : '<span></span>'}
    ${next ? `<button class="d-nav-btn next" onclick="showDetail('${next.id}')">${next.fullName} →</button>` : ''}
  </div>`;
}

// ── RIGHT TOC ─────────────────────────────────────
function renderToc(items, v, ac, variantsHTML, pf, bt, dim, ft, war) {
  const tocEl  = document.getElementById('rightToc');
  const tocList = document.getElementById('tocList');

  if (!v) {
    tocEl.style.display = 'none';
    return;
  }
  tocEl.style.display = 'block';
  tocList.innerHTML = items.map((item,i)=>
    `<li class="toc-item ${i===0?'active':''}" onclick="scrollToSection('${item.id}',this)">${item.label}</li>`
  ).join('');

  // Price card in TOC area
  const existingCard = document.getElementById('toc-price-card');
  if (existingCard) existingCard.remove();

  const card = document.createElement('div');
  card.id = 'toc-price-card';
  card.style.marginBottom = '1.25rem';
  card.innerHTML = `
    <div class="d-price-card">
      <div class="d-price" style="color:${ac}">${fmtPrice(v?.pricing?.base)}</div>
      <div class="d-price-note">${v?.pricing?.note||'Giá tham khảo'}</div>
      ${variantsHTML||''}
      <div class="d-quick-specs" style="margin-top:.75rem">
        <div class="dqs-row"><span class="dqs-label">⚡ Tốc độ tối đa</span><span class="dqs-val">${pf?.topSpeed?.value||'—'} km/h</span></div>
        <div class="dqs-row"><span class="dqs-label">📏 Quãng đường</span><span class="dqs-val">${pf?.range?.value||'—'} km</span></div>
        <div class="dqs-row"><span class="dqs-label">🔋 Pin</span><span class="dqs-val">${bt?.voltage?.value||'—'}V/${bt?.capacity?.value||bt?.capacity?.value||'—'}</span></div>
        <div class="dqs-row"><span class="dqs-label">🏋 Trọng lượng</span><span class="dqs-val">${dim?.weight?.value||'—'} kg</span></div>
        <div class="dqs-row"><span class="dqs-label">🛡 Chống nước</span><span class="dqs-val">${ft?.waterproof?.value||'—'}</span></div>
      </div>
    </div>
    <div class="d-warranty-card">
      <div class="d-warranty-title">🛠 Bảo hành</div>
      ${Object.values(war||{}).map(f=>`
        <div class="d-warranty-row">
          <span>${f.label}</span><span>${f.value||'—'}</span>
        </div>`).join('')}
    </div>
  `;
  tocEl.insertBefore(card, tocEl.querySelector('.toc-title'));
}

function scrollToSection(id, el) {
  document.querySelectorAll('.toc-item').forEach(t=>t.classList.remove('active'));
  if (el) el.classList.add('active');
  const target = document.getElementById(id);
  if (target) {
    const y = target.getBoundingClientRect().top + window.scrollY - 80;
    window.scrollTo({top:y, behavior:'smooth'});
  }
}

function switchTab(k) {
  document.querySelectorAll('.spec-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.specs-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+k)?.classList.add('active');
  document.getElementById('panel-'+k)?.classList.add('active');
}
function pickColor(el, name) {
  document.querySelectorAll('.cswatch').forEach(s=>s.classList.remove('active'));
  el.classList.add('active');
  const lbl = document.getElementById('colorName');
  if (lbl) lbl.textContent = name;
}

// ── SIDEBAR TOGGLE ────────────────────────────────
function toggleSidebar() {
  const sb = document.getElementById('leftSidebar');
  const ov = document.getElementById('sbOverlay');
  const open = sb.classList.toggle('open');
  ov.classList.toggle('open', open);
}
function closeSidebar() {
  document.getElementById('leftSidebar').classList.remove('open');
  document.getElementById('sbOverlay').classList.remove('open');
}

// ── SEARCH ───────────────────────────────────────
function initSearch() {
  const inp  = document.getElementById('searchInput');
  const drop = document.getElementById('searchDrop');
  inp.addEventListener('input', ()=>{
    const q = inp.value.toLowerCase().trim();
    if (!q||!DB) { drop.classList.remove('open'); return; }
    const res = DB.vehicles.filter(v=>
      v.fullName.toLowerCase().includes(q)||v.brand.includes(q)||
      v.series.toLowerCase().includes(q)||(v.tags||[]).some(t=>t.includes(q))
    ).slice(0,6);
    if (!res.length) { drop.classList.remove('open'); return; }
    drop.innerHTML = res.map(v=>{
      const ac = DB.brands[v.brand].accentColor;
      return `<div class="sdrop-item" onclick="showDetail('${v.id}');inp.value='';drop.classList.remove('open')">
        <span class="sdrop-brand" style="background:${ac}18;color:${ac}">${v.brand.toUpperCase()}</span>
        <div>
          <div class="sdrop-name">${v.fullName}</div>
          <div class="sdrop-meta">${fmtPrice(v.pricing?.base)} · ${v.specs.performance.fields.range?.value||'—'}km · ${v.specs.performance.fields.topSpeed?.value||'—'}km/h</div>
        </div>
      </div>`;
    }).join('');
    drop.classList.add('open');
  });
  document.addEventListener('click', e=>{
    if (!inp.contains(e.target)&&!drop.contains(e.target)) drop.classList.remove('open');
  });
}
