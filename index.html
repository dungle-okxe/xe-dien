<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Từ Điển Xe Điện | Yadea & VinFast</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --white: #FFFFFF;
  --off-white: #F7F6F3;
  --paper: #FAFAF8;
  --black: #0D0D0D;
  --ink: #1A1A1A;
  --gray-900: #111111;
  --gray-700: #3D3D3D;
  --gray-500: #6B6B6B;
  --gray-300: #C4C4C4;
  --gray-100: #F0EFEC;
  --gray-50:  #F7F6F3;
  --yadea: #0099BB;
  --yadea-light: #E6F6FA;
  --yadea-mid: #CCF0F8;
  --vinfast: #D92B3A;
  --vinfast-light: #FDECEA;
  --vinfast-mid: #FBCDD0;
  --gold: #C9960C;
  --green: #1A7A3C;
  --border: #E8E6E1;
  --border-dark: #D0CEC9;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow-md: 0 4px 16px rgba(0,0,0,.08), 0 2px 6px rgba(0,0,0,.04);
  --shadow-lg: 0 12px 40px rgba(0,0,0,.10), 0 4px 12px rgba(0,0,0,.06);
  --shadow-xl: 0 24px 64px rgba(0,0,0,.12);
  --radius: 12px;
  --radius-sm: 6px;
  --radius-lg: 20px;
  --font-display: 'Playfair Display', Georgia, serif;
  --font-body: 'Be Vietnam Pro', sans-serif;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box }
html { scroll-behavior:smooth; font-size:16px }
body {
  font-family: var(--font-body);
  background: var(--white);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}
::-webkit-scrollbar { width: 4px }
::-webkit-scrollbar-track { background: var(--gray-50) }
::-webkit-scrollbar-thumb { background: var(--gray-300); border-radius: 2px }

/* ── HEADER ─────────────────────────────────── */
.header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 300;
  height: 58px;
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(20px) saturate(180%);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 2.5rem;
  gap: 2rem;
}
.logo {
  font-family: var(--font-display);
  font-size: 1.05rem; font-weight: 700;
  color: var(--black); cursor: pointer;
  display: flex; align-items: center; gap: .6rem;
  white-space: nowrap;
  text-decoration: none;
}
.logo-divider {
  width: 1px; height: 18px;
  background: var(--gray-300);
}
.logo-sub {
  font-family: var(--font-body);
  font-size: .65rem; font-weight: 600;
  color: var(--gray-500);
  text-transform: uppercase; letter-spacing: .12em;
}
.header-nav {
  display: flex; gap: 0; margin-left: .5rem;
}
.nav-btn {
  font-family: var(--font-body); font-size: .78rem;
  font-weight: 500; color: var(--gray-500);
  background: none; border: none; cursor: pointer;
  padding: 6px 14px; border-radius: 6px;
  transition: all .2s;
}
.nav-btn:hover, .nav-btn.active { color: var(--black); background: var(--gray-100) }
.header-right {
  margin-left: auto;
  display: flex; align-items: center; gap: .75rem;
}
.search-wrap { position: relative }
.search-input {
  font-family: var(--font-body); font-size: .82rem;
  background: var(--gray-50); border: 1.5px solid var(--border);
  color: var(--ink); border-radius: 24px;
  padding: 7px 16px 7px 38px;
  width: 220px; outline: none; transition: all .25s;
}
.search-input:focus {
  border-color: var(--yadea); width: 280px;
  background: var(--white);
  box-shadow: 0 0 0 3px var(--yadea-light);
}
.search-icon {
  position: absolute; left: 13px; top: 50%;
  transform: translateY(-50%); color: var(--gray-500);
  font-size: .9rem; pointer-events: none;
}
.search-dropdown {
  position: absolute; top: calc(100% + 8px); left: 0;
  min-width: 340px; background: var(--white);
  border: 1.5px solid var(--border); border-radius: var(--radius);
  box-shadow: var(--shadow-xl); overflow: hidden; display: none; z-index: 999;
}
.search-dropdown.open { display: block }
.sdrop-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 14px; cursor: pointer;
  border-bottom: 1px solid var(--gray-50);
  transition: background .15s;
}
.sdrop-item:hover { background: var(--gray-50) }
.sdrop-item:last-child { border: none }
.sdrop-brand { font-size: .6rem; font-weight: 700; padding: 3px 8px; border-radius: 4px; white-space: nowrap }
.sdrop-name { font-size: .84rem; font-weight: 600; color: var(--ink) }
.sdrop-meta { font-size: .7rem; color: var(--gray-500); margin-top: 1px }
.view-btns { display: flex; gap: 3px }
.view-btn {
  width: 32px; height: 32px; border-radius: 6px;
  background: none; border: 1.5px solid var(--border);
  color: var(--gray-500); cursor: pointer; font-size: .85rem;
  display: flex; align-items: center; justify-content: center;
  transition: all .2s;
}
.view-btn.active, .view-btn:hover {
  background: var(--gray-100); color: var(--black); border-color: var(--gray-300);
}

/* ── VIEWS ─────────────────────────────────── */
#view-catalog, #view-detail { min-height: 100vh; padding-top: 58px }
#view-detail { display: none }

/* ── HERO ───────────────────────────────────── */
.hero {
  padding: 5rem 2.5rem 4rem;
  max-width: 1400px; margin: 0 auto;
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 4rem; align-items: center;
  position: relative;
}
.hero::after {
  content: '';
  position: absolute; top: 3rem; right: -2rem;
  width: 500px; height: 500px; border-radius: 50%;
  background: radial-gradient(circle, var(--yadea-light) 0%, transparent 70%);
  pointer-events: none; z-index: 0;
}
.hero-left { position: relative; z-index: 1 }
.hero-pill {
  display: inline-flex; align-items: center; gap: 7px;
  border: 1.5px solid var(--border);
  padding: 5px 14px 5px 10px;
  border-radius: 20px; margin-bottom: 1.5rem;
  font-size: .7rem; font-weight: 600;
  color: var(--gray-700); text-transform: uppercase; letter-spacing: .1em;
}
.pill-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--green); box-shadow: 0 0 0 2px rgba(26,122,60,.2);
}
.hero h1 {
  font-family: var(--font-display);
  font-size: clamp(2.8rem, 5vw, 4.5rem);
  font-weight: 900; line-height: 1.05;
  color: var(--black); margin-bottom: 1.2rem;
  letter-spacing: -.02em;
}
.h1-accent { font-style: italic; color: var(--yadea) }
.h1-accent2 { font-style: italic; color: var(--vinfast) }
.hero-desc {
  font-size: .95rem; line-height: 1.8;
  color: var(--gray-500); max-width: 480px; margin-bottom: 2.5rem;
}
.hero-stats {
  display: flex; gap: 2rem;
}
.hstat {
  padding-right: 2rem;
  border-right: 1px solid var(--border);
}
.hstat:last-child { border: none }
.hstat-num {
  font-family: var(--font-display);
  font-size: 2rem; font-weight: 900;
  line-height: 1; color: var(--black);
}
.hstat-label {
  font-size: .65rem; color: var(--gray-500);
  text-transform: uppercase; letter-spacing: .1em;
  margin-top: .3rem;
}
.hero-right {
  position: relative; z-index: 1;
  display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;
}
.hero-card {
  background: var(--paper); border: 1.5px solid var(--border);
  border-radius: var(--radius); padding: 1.2rem;
  transition: all .3s;
}
.hero-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-lg);
  border-color: var(--border-dark);
}
.hero-card:first-child {
  grid-column: 1/-1;
  background: var(--black); color: var(--white);
  display: flex; align-items: center; gap: 1.5rem;
}
.hcard-icon { font-size: 3.5rem; flex-shrink: 0 }
.hcard-brand {
  font-size: .6rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: .12em;
  margin-bottom: .3rem;
}
.hcard-name {
  font-family: var(--font-display);
  font-size: 1.2rem; font-weight: 700; line-height: 1.2;
  margin-bottom: .4rem;
}
.hero-card:first-child .hcard-name { color: var(--white) }
.hcard-price {
  font-size: .85rem; font-weight: 700;
}
.hero-card:first-child .hcard-price { color: var(--yadea) }
.hcard-stat {
  font-size: .7rem; color: var(--gray-500);
  margin-top: .2rem;
}
.hero-card:first-child .hcard-stat { color: rgba(255,255,255,.5) }
.hcard-tag {
  font-size: .58rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: .08em;
  padding: 2px 7px; border-radius: 3px;
  display: inline-block; margin-bottom: .5rem;
}

/* ── DIVIDER ─────────────────────────────────── */
.section-divider {
  max-width: 1400px; margin: 0 auto;
  border: none; border-top: 1px solid var(--border);
}

/* ── FILTERS ─────────────────────────────────── */
.filters-bar {
  max-width: 1400px; margin: 0 auto;
  padding: 1.25rem 2.5rem;
  display: flex; align-items: center; gap: .6rem; flex-wrap: wrap;
}
.filter-group-label {
  font-size: .65rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: .1em;
  color: var(--gray-500); margin-right: .2rem;
}
.fchip {
  font-family: var(--font-body);
  font-size: .75rem; font-weight: 500;
  padding: 5px 14px; border-radius: 20px;
  border: 1.5px solid var(--border);
  background: var(--white); color: var(--gray-700);
  cursor: pointer; transition: all .2s; white-space: nowrap;
}
.fchip:hover { border-color: var(--gray-300); background: var(--gray-50) }
.fchip.active { background: var(--black); color: var(--white); border-color: var(--black) }
.fchip.yadea.active { background: var(--yadea); border-color: var(--yadea); color: var(--white) }
.fchip.vinfast.active { background: var(--vinfast); border-color: var(--vinfast); color: var(--white) }
.fsep { width: 1px; height: 18px; background: var(--border); flex-shrink: 0; margin: 0 .2rem }
.sort-sel {
  font-family: var(--font-body); font-size: .75rem; font-weight: 500;
  background: var(--white); border: 1.5px solid var(--border);
  color: var(--gray-700); padding: 5px 12px; border-radius: 20px;
  outline: none; cursor: pointer; margin-left: auto;
  transition: border-color .2s;
}
.sort-sel:focus { border-color: var(--gray-300) }
.results-count {
  font-size: .75rem; color: var(--gray-500);
  margin-left: .5rem; white-space: nowrap;
}

/* ── CATALOG ─────────────────────────────────── */
.catalog {
  max-width: 1400px; margin: 0 auto;
  padding: 1rem 2.5rem 5rem;
}
.catalog-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(330px, 1fr));
  gap: 1.5rem;
}
.catalog-grid.list-view { grid-template-columns: 1fr }

/* ── VEHICLE CARD ─────────────────────────────── */
.vcard {
  background: var(--white);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden; cursor: pointer;
  transition: all .3s ease;
  position: relative;
}
.vcard:hover {
  box-shadow: var(--shadow-lg);
  transform: translateY(-5px);
  border-color: var(--border-dark);
}
.vcard-img {
  height: 200px; position: relative; overflow: hidden;
  display: flex; align-items: center; justify-content: center;
}
.brand-yadea .vcard-img { background: linear-gradient(135deg, #EBF8FC 0%, #D0EFF7 100%) }
.brand-vinfast .vcard-img { background: linear-gradient(135deg, #FDECEA 0%, #FAD5D8 100%) }
.vcard-img-icon {
  font-size: 7rem; opacity: .25;
  transition: transform .5s ease; user-select: none;
}
.vcard:hover .vcard-img-icon { transform: scale(1.06) translateY(-4px) }
.vcard-badges {
  position: absolute; top: 12px; left: 12px;
  display: flex; gap: 5px; flex-wrap: wrap;
}
.vbadge {
  font-size: .58rem; font-weight: 700;
  padding: 3px 8px; border-radius: 3px;
  text-transform: uppercase; letter-spacing: .06em;
}
.vbadge-new { background: var(--green); color: var(--white) }
.vbadge-hot { background: var(--gold); color: var(--white) }
.vbadge-flagship { background: var(--vinfast); color: var(--white) }
.vbadge-bestseller { background: var(--yadea); color: var(--white) }
.vbadge-default { background: var(--black); color: var(--white) }

.brand-tag {
  position: absolute; top: 12px; right: 12px;
  font-size: .6rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: .1em;
  padding: 3px 9px; border-radius: 3px;
}
.brand-yadea .brand-tag { background: var(--yadea-mid); color: var(--yadea) }
.brand-vinfast .brand-tag { background: var(--vinfast-mid); color: var(--vinfast) }

.vcard-body { padding: 1.25rem 1.4rem }
.vcard-series {
  font-size: .62rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: .12em;
  color: var(--gray-500); margin-bottom: .3rem;
}
.vcard-name {
  font-family: var(--font-display);
  font-size: 1.25rem; font-weight: 700;
  color: var(--black); margin-bottom: .2rem; line-height: 1.2;
}
.vcard-tagline {
  font-size: .78rem; color: var(--gray-500);
  font-style: italic; margin-bottom: 1rem; line-height: 1.5;
}
.vcard-price {
  font-family: var(--font-display);
  font-size: 1.3rem; font-weight: 700;
  margin-bottom: 1rem;
}
.brand-yadea .vcard-price { color: var(--yadea) }
.brand-vinfast .vcard-price { color: var(--vinfast) }

.vcard-specs {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: .5rem; margin-bottom: 1rem;
}
.vspec {
  background: var(--gray-50);
  border-radius: var(--radius-sm);
  padding: .55rem .7rem;
  border: 1px solid var(--border);
}
.vspec-label {
  font-size: .58rem; font-weight: 600;
  text-transform: uppercase; letter-spacing: .07em;
  color: var(--gray-500);
}
.vspec-value {
  font-size: .84rem; font-weight: 700;
  color: var(--black); margin-top: .15rem;
}

.vcard-chips { display: flex; gap: .35rem; flex-wrap: wrap; margin-bottom: 1rem }
.vchip {
  font-size: .64rem; font-weight: 500;
  color: var(--gray-700); background: var(--gray-100);
  padding: 3px 9px; border-radius: 4px;
  display: flex; align-items: center; gap: 4px;
}

.vcard-footer {
  border-top: 1px solid var(--border);
  padding: .85rem 1.4rem;
  display: flex; align-items: center; justify-content: space-between;
}
.vrating { display: flex; align-items: center; gap: 6px }
.rating-stars { color: var(--gold); font-size: .75rem; letter-spacing: 1px }
.rating-text { font-size: .7rem; color: var(--gray-500) }
.btn-view {
  font-family: var(--font-body); font-size: .75rem; font-weight: 600;
  padding: 6px 16px; border-radius: 6px; border: none; cursor: pointer;
  transition: all .2s;
}
.brand-yadea .btn-view { background: var(--yadea-light); color: var(--yadea) }
.brand-yadea .btn-view:hover { background: var(--yadea); color: var(--white) }
.brand-vinfast .btn-view { background: var(--vinfast-light); color: var(--vinfast) }
.brand-vinfast .btn-view:hover { background: var(--vinfast); color: var(--white) }

/* LIST VIEW */
.catalog-grid.list-view .vcard { display: flex; flex-direction: row }
.catalog-grid.list-view .vcard-img { width: 220px; height: auto; flex-shrink: 0 }
.catalog-grid.list-view .vcard-body { flex: 1 }
@media(max-width:640px) { .catalog-grid.list-view .vcard { flex-direction: column } }

/* EMPTY */
.empty-state {
  grid-column: 1/-1; text-align: center;
  padding: 5rem 2rem; color: var(--gray-500);
}
.empty-icon { font-size: 3rem; opacity: .4; margin-bottom: 1rem }

/* ── DETAIL VIEW ──────────────────────────────── */
.detail-wrap { max-width: 1200px; margin: 0 auto; padding: 2.5rem 2.5rem 1rem }
.detail-back {
  display: inline-flex; align-items: center; gap: 8px;
  font-family: var(--font-body); font-size: .8rem; font-weight: 500;
  color: var(--gray-500); background: none;
  border: 1.5px solid var(--border); border-radius: 6px;
  padding: 6px 14px; cursor: pointer; transition: all .2s; margin-bottom: 2rem;
}
.detail-back:hover { color: var(--black); background: var(--gray-50) }

.detail-layout { display: grid; grid-template-columns: 1fr 360px; gap: 3rem; align-items: start }
@media(max-width:900px) { .detail-layout { grid-template-columns: 1fr } }

/* LEFT */
.detail-brand-line { display: flex; align-items: center; gap: 10px; margin-bottom: .5rem }
.detail-series-tag {
  font-size: .62rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: .12em;
  padding: 3px 10px; border-radius: 3px;
}
.detail-badges-row { display: flex; gap: 6px }
.detail-name {
  font-family: var(--font-display);
  font-size: clamp(2.2rem, 5vw, 3.2rem);
  font-weight: 900; line-height: 1.1; letter-spacing: -.02em;
  color: var(--black); margin-bottom: .6rem;
}
.detail-tagline {
  font-size: 1.05rem; color: var(--gray-500);
  font-style: italic; line-height: 1.6; margin-bottom: 1rem;
}
.detail-desc {
  font-size: .9rem; color: var(--gray-700);
  line-height: 1.8; margin-bottom: 2rem;
  padding-bottom: 2rem; border-bottom: 1px solid var(--border);
}

/* MEDIA BOX */
.detail-media {
  background: var(--gray-50);
  border: 1.5px solid var(--border);
  border-radius: var(--radius); overflow: hidden; margin-bottom: 2rem;
}
.detail-media-main {
  height: 300px;
  display: flex; align-items: center; justify-content: center;
  font-size: 10rem; opacity: .2;
}
.brand-yadea .detail-media-main { background: linear-gradient(135deg, #EBF8FC, #CCF0F8) }
.brand-vinfast .detail-media-main { background: linear-gradient(135deg, #FDECEA, #FAD5D8) }
.detail-colors-bar {
  border-top: 1px solid var(--border); padding: 1rem 1.25rem;
  display: flex; align-items: center; gap: 1rem;
}
.colors-label {
  font-size: .65rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: .1em;
  color: var(--gray-500); white-space: nowrap;
}
.color-swatches { display: flex; gap: .4rem; flex-wrap: wrap }
.cswatch {
  width: 24px; height: 24px; border-radius: 50%;
  cursor: pointer; border: 2px solid transparent;
  transition: all .2s; box-shadow: 0 1px 3px rgba(0,0,0,.15);
}
.cswatch:hover, .cswatch.active { border-color: var(--black); transform: scale(1.15) }
.color-name-label { font-size: .72rem; color: var(--gray-500); min-width: 80px }

/* HIGHLIGHTS */
.section-heading {
  font-size: .7rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: .12em;
  color: var(--gray-500); margin-bottom: .9rem;
  display: flex; align-items: center; gap: .75rem;
}
.section-heading::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}
.highlights-grid { display: flex; flex-direction: column; gap: .6rem; margin-bottom: 2rem }
.highlight-item {
  display: flex; align-items: flex-start; gap: .85rem;
  padding: .8rem 1rem;
  background: var(--gray-50); border: 1px solid var(--border);
  border-radius: var(--radius-sm); font-size: .84rem; line-height: 1.5;
  color: var(--gray-700);
}
.hi-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-top: .45rem }
.brand-yadea .hi-dot { background: var(--yadea) }
.brand-vinfast .hi-dot { background: var(--vinfast) }

/* PROS CONS */
.pros-cons { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 2rem }
.pc-box {
  background: var(--gray-50); border: 1.5px solid var(--border);
  border-radius: var(--radius-sm); padding: 1rem 1.1rem;
}
.pc-title { font-size: .65rem; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; margin-bottom: .6rem }
.pros .pc-title { color: var(--green) }
.cons .pc-title { color: var(--vinfast) }
.pc-list { list-style: none; display: flex; flex-direction: column; gap: .4rem }
.pc-list li { font-size: .8rem; color: var(--gray-700); padding-left: 1rem; position: relative; line-height: 1.4 }
.pc-list.pros li::before { content:'✓'; position:absolute; left:0; color:var(--green); font-weight:700 }
.pc-list.cons li::before { content:'×'; position:absolute; left:0; color:var(--vinfast); font-weight:700 }

/* SPEC TABS */
.spec-tabs { display: flex; gap: 4px; margin-bottom: 1rem; flex-wrap: wrap }
.spec-tab {
  font-family: var(--font-body); font-size: .74rem; font-weight: 600;
  padding: 6px 14px; border-radius: var(--radius-sm);
  border: 1.5px solid var(--border); background: var(--white);
  color: var(--gray-500); cursor: pointer; transition: all .2s;
}
.spec-tab:hover { color: var(--black); background: var(--gray-50) }
.spec-tab.active { background: var(--black); color: var(--white); border-color: var(--black) }
.specs-panel { display: none }
.specs-panel.active { display: block }
.specs-table { width: 100%; border-collapse: collapse }
.specs-table tr { border-bottom: 1px solid var(--border) }
.specs-table tr:last-child { border: none }
.specs-table tr:hover td { background: var(--gray-50) }
.specs-table td { padding: .6rem .75rem; font-size: .83rem }
.specs-table td:first-child { color: var(--gray-500); width: 50% }
.specs-table td:last-child { font-weight: 600; color: var(--ink); text-align: right }
.spec-null { color: var(--gray-300) !important; font-style: italic; font-weight: 400 !important }
.spec-true { color: var(--green); font-weight: 700 !important }
.spec-false { color: var(--gray-400) }

/* RIGHT — STICKY */
.sticky-card {
  background: var(--white); border: 1.5px solid var(--border);
  border-radius: var(--radius); padding: 1.75rem;
  position: sticky; top: 74px;
  box-shadow: var(--shadow-md);
}
.sticky-price {
  font-family: var(--font-display); font-size: 2.2rem; font-weight: 900;
  line-height: 1; margin-bottom: .3rem; color: var(--black);
}
.brand-yadea .sticky-price { color: var(--yadea) }
.brand-vinfast .sticky-price { color: var(--vinfast) }
.sticky-note { font-size: .72rem; color: var(--gray-500); margin-bottom: 1.5rem }
.sticky-divider { height: 1px; background: var(--border); margin: 1.25rem 0 }
.sticky-specs { display: flex; flex-direction: column; gap: .5rem; margin-bottom: .5rem }
.ss-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: .55rem .75rem;
  background: var(--gray-50); border-radius: var(--radius-sm);
  border: 1px solid var(--border);
}
.ss-label { font-size: .72rem; color: var(--gray-500); display: flex; align-items: center; gap: 7px }
.ss-val { font-size: .85rem; font-weight: 700; color: var(--black) }
.warranty-block { margin-top: .5rem }
.warranty-title {
  font-size: .62rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: .1em;
  color: var(--gray-500); margin-bottom: .6rem;
}
.warranty-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: .4rem 0; border-bottom: 1px solid var(--border);
  font-size: .78rem;
}
.warranty-row:last-child { border: none }
.warranty-row span:first-child { color: var(--gray-500) }
.warranty-row span:last-child { font-weight: 600; color: var(--ink) }

/* RELATED */
.related-wrap { max-width: 1200px; margin: 0 auto; padding: 2rem 2.5rem 5rem }
.related-title {
  font-family: var(--font-display); font-size: 1.5rem; font-weight: 700;
  color: var(--black); margin-bottom: 1.5rem;
  display: flex; align-items: center; gap: 1rem;
}
.related-title::after { content: ''; flex: 1; height: 1px; background: var(--border) }
.related-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.25rem }

/* FOOTER */
footer {
  border-top: 1px solid var(--border);
  padding: 2rem 2.5rem;
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 1rem;
  font-size: .75rem; color: var(--gray-500);
  max-width: 1400px; margin: 0 auto;
}
.footer-logo {
  font-family: var(--font-display); font-weight: 700;
  font-size: .9rem; color: var(--black);
}

/* ANIMATIONS */
@keyframes fadeUp { from { opacity:0; transform:translateY(16px) } to { opacity:1; transform:none } }
.fade-up { animation: fadeUp .4s ease both }

/* RESPONSIVE */
@media(max-width:900px) {
  .hero { grid-template-columns: 1fr; gap: 2rem }
  .hero::after { display: none }
  .hero-right { display: none }
  .detail-layout { grid-template-columns: 1fr }
  .pros-cons { grid-template-columns: 1fr }
}
@media(max-width:600px) {
  .header { padding: 0 1.25rem }
  .hero { padding: 3rem 1.25rem 2.5rem }
  .filters-bar { padding: 1rem 1.25rem }
  .catalog { padding: .75rem 1.25rem 4rem }
  .detail-wrap, .related-wrap { padding: 1.5rem 1.25rem 2rem }
  .search-input { width: 160px }
  .search-input:focus { width: 200px }
  .logo-sub, .header-nav { display: none }
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <a class="logo" onclick="showCatalog()">
    Từ Điển Xe Điện
  </a>
  <div class="logo-divider"></div>
  <span class="logo-sub">Yadea & VinFast 2024–2025</span>
  <nav class="header-nav">
    <button class="nav-btn active" onclick="applyFilter(this,'all')">Tất cả</button>
    <button class="nav-btn" onclick="applyFilter(this,'brand:yadea')">Yadea</button>
    <button class="nav-btn" onclick="applyFilter(this,'brand:vinfast')">VinFast</button>
  </nav>
  <div class="header-right">
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input class="search-input" id="searchInput" type="text" placeholder="Tìm xe..." autocomplete="off">
      <div class="search-dropdown" id="searchDrop"></div>
    </div>
    <div class="view-btns">
      <button class="view-btn active" id="btnGrid" onclick="setView('grid')" title="Lưới">⊞</button>
      <button class="view-btn" id="btnList" onclick="setView('list')" title="Danh sách">☰</button>
    </div>
  </div>
</header>

<!-- CATALOG VIEW -->
<div id="view-catalog">

  <!-- HERO -->
  <section class="hero">
    <div class="hero-left">
      <div class="hero-pill"><span class="pill-dot"></span> Cập nhật 2024 – 2025</div>
      <h1>Từ điển<br><span class="h1-accent">Yadea</span><br>& <span class="h1-accent2">VinFast</span></h1>
      <p class="hero-desc">Tra cứu đầy đủ thông số kỹ thuật, giá bán và tính năng của tất cả mẫu xe điện. Dữ liệu chuẩn, luôn được cập nhật.</p>
      <div class="hero-stats" id="heroStats"></div>
    </div>
    <div class="hero-right" id="heroCards"></div>
  </section>

  <hr class="section-divider">

  <!-- FILTERS -->
  <div class="filters-bar">
    <span class="filter-group-label">Lọc</span>
    <button class="fchip active" data-f="all" onclick="applyFilterChip(this)">Tất cả</button>
    <button class="fchip yadea" data-f="brand:yadea" onclick="applyFilterChip(this)">⚡ Yadea</button>
    <button class="fchip vinfast" data-f="brand:vinfast" onclick="applyFilterChip(this)">🔴 VinFast</button>
    <div class="fsep"></div>
    <button class="fchip" data-f="price:under20" onclick="applyFilterChip(this)">Dưới 20 triệu</button>
    <button class="fchip" data-f="price:20to40" onclick="applyFilterChip(this)">20–40 triệu</button>
    <button class="fchip" data-f="price:above40" onclick="applyFilterChip(this)">Trên 40 triệu</button>
    <div class="fsep"></div>
    <button class="fchip" data-f="feat:esim" onclick="applyFilterChip(this)">📶 eSIM 4G</button>
    <button class="fchip" data-f="feat:gps" onclick="applyFilterChip(this)">🗺 GPS</button>
    <button class="fchip" data-f="feat:removable" onclick="applyFilterChip(this)">🔋 Pin tháo rời</button>
    <select class="sort-sel" id="sortSel" onchange="applySort()">
      <option value="">Sắp xếp</option>
      <option value="price-asc">Giá tăng dần</option>
      <option value="price-desc">Giá giảm dần</option>
      <option value="range-desc">Quãng đường xa nhất</option>
      <option value="speed-desc">Tốc độ cao nhất</option>
    </select>
    <span class="results-count" id="resultsCount"></span>
  </div>

  <!-- GRID -->
  <div class="catalog">
    <div class="catalog-grid" id="catalogGrid"></div>
  </div>

</div>

<!-- DETAIL VIEW -->
<div id="view-detail">
  <div class="detail-wrap">
    <button class="detail-back" onclick="showCatalog()">← Quay lại</button>
    <div id="detailContent"></div>
  </div>
  <div class="related-wrap" id="relatedWrap"></div>
</div>

<footer>
  <span class="footer-logo">Từ Điển Xe Điện</span>
  <span>Yadea & VinFast · Phiên bản 2024–2025 · Dữ liệu mang tính tham khảo</span>
</footer>

<script>
const DB_URL = 'data/vehicles.json';
let DB = null;
let activeFilter = 'all';
let activeSort   = '';
let activeView   = 'grid';

async function loadData() {
  try {
    const r = await fetch(DB_URL);
    DB = await r.json();
  } catch(e) {
    DB = DEMO_DATA;
  }
  init();
}

function init() {
  renderHero();
  renderCatalog();
  initSearch();
}

// ── FORMAT ──────────────────────────────────────
function fmtPrice(n) {
  if (!n) return '—';
  return new Intl.NumberFormat('vi-VN').format(n) + ' ₫';
}
function fmtVal(f) {
  if (f.value === null || f.value === undefined) return '<span class="spec-null">—</span>';
  if (typeof f.value === 'boolean')
    return f.value
      ? '<span class="spec-true">✓ Có</span>'
      : '<span class="spec-false">Không</span>';
  return `${f.value}${f.unit ? ' ' + f.unit : ''}`;
}
function badgeClass(b) {
  const m = b.toLowerCase();
  if (m.includes('chạy') || m.includes('best')) return 'vbadge-bestseller';
  if (m.includes('flagship') || m.includes('cao cấp')) return 'vbadge-flagship';
  if (m.match(/20\d\d/) || m.includes('mới')) return 'vbadge-new';
  if (m.includes('hot') || m.includes('phổ biến')) return 'vbadge-hot';
  return 'vbadge-default';
}

// ── HERO ────────────────────────────────────────
function renderHero() {
  const total   = DB.vehicles.length;
  const yadea   = DB.vehicles.filter(v=>v.brand==='yadea').length;
  const vinfast = DB.vehicles.filter(v=>v.brand==='vinfast').length;
  document.getElementById('heroStats').innerHTML = `
    <div class="hstat"><div class="hstat-num" style="color:var(--yadea)">${yadea}</div><div class="hstat-label">Mẫu Yadea</div></div>
    <div class="hstat"><div class="hstat-num" style="color:var(--vinfast)">${vinfast}</div><div class="hstat-label">Mẫu VinFast</div></div>
    <div class="hstat"><div class="hstat-num">${total}</div><div class="hstat-label">Tổng mẫu xe</div></div>
  `;
  const featured = DB.vehicles.slice(0, 3);
  const brand = DB.brands;
  document.getElementById('heroCards').innerHTML = featured.map((v,i) => `
    <div class="hero-card ${i===0?'':'brand-'+v.brand}" onclick="showDetail('${v.id}')" style="cursor:pointer">
      ${i===0 ? `
        ${v.images?.main ? `<img src="${v.images.main}" alt="${v.fullName}" style="width:80px;height:80px;object-fit:contain;flex-shrink:0" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">` : ''}
        <div class="hcard-icon" style="${v.images?.main ? 'display:none' : ''}">🛵</div>
        <div>
          <div class="hcard-brand" style="color:${brand[v.brand].accentColor}">${v.brand.toUpperCase()}</div>
          <div class="hcard-name">${v.fullName}</div>
          <div class="hcard-price" style="color:${brand[v.brand].accentColor}">${fmtPrice(v.pricing.base)}</div>
          <div class="hcard-stat">${v.specs.performance.fields.range?.value||'—'}km · ${v.specs.performance.fields.topSpeed?.value||'—'}km/h</div>
        </div>
      ` : `
        <div class="hcard-tag" style="background:${brand[v.brand].accentColor}18;color:${brand[v.brand].accentColor}">${v.brand.toUpperCase()}</div>
        <div class="hcard-name" style="font-size:.95rem;font-family:var(--font-display);font-weight:700">${v.fullName}</div>
        <div class="hcard-price" style="color:${brand[v.brand].accentColor};font-size:.9rem;font-weight:700;margin-top:.3rem">${fmtPrice(v.pricing.base)}</div>
        <div class="hcard-stat">${v.specs.performance.fields.range?.value||'—'}km</div>
      `}
    </div>
  `).join('');
}

// ── FILTER & SORT ────────────────────────────────
function applyFilter(btn, val) {
  activeFilter = val;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  document.querySelectorAll('.fchip').forEach(c => {
    c.classList.toggle('active', c.dataset.f === val);
  });
  renderCatalog();
}
function applyFilterChip(btn) {
  activeFilter = btn.dataset.f;
  document.querySelectorAll('.fchip').forEach(c=>c.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  renderCatalog();
}
function applySort() {
  activeSort = document.getElementById('sortSel').value;
  renderCatalog();
}
function setView(v) {
  activeView = v;
  document.getElementById('catalogGrid').className = 'catalog-grid' + (v==='list'?' list-view':'');
  document.getElementById('btnGrid').classList.toggle('active', v==='grid');
  document.getElementById('btnList').classList.toggle('active', v==='list');
}

function getFiltered() {
  let list = [...DB.vehicles];
  if (activeFilter !== 'all') {
    const [type, val] = activeFilter.split(':');
    if (type==='brand') list = list.filter(v=>v.brand===val);
    else if (type==='price') {
      if (val==='under20')  list = list.filter(v=>(v.pricing.base||0)<20000000);
      if (val==='20to40')   list = list.filter(v=>(v.pricing.base||0)>=20000000&&(v.pricing.base||0)<=40000000);
      if (val==='above40')  list = list.filter(v=>(v.pricing.base||0)>40000000);
    } else if (type==='feat') {
      if (val==='esim')     list = list.filter(v=>v.specs.features.fields.esim?.value===true);
      if (val==='gps')      list = list.filter(v=>v.specs.features.fields.gps?.value===true);
      if (val==='removable')list = list.filter(v=>v.specs.battery.fields.removable?.value===true);
    }
  }
  if (activeSort) {
    list.sort((a,b)=>{
      if (activeSort==='price-asc')  return (a.pricing.base||0)-(b.pricing.base||0);
      if (activeSort==='price-desc') return (b.pricing.base||0)-(a.pricing.base||0);
      if (activeSort==='range-desc') return (b.specs.performance.fields.range?.value||0)-(a.specs.performance.fields.range?.value||0);
      if (activeSort==='speed-desc') return (b.specs.performance.fields.topSpeed?.value||0)-(a.specs.performance.fields.topSpeed?.value||0);
      return 0;
    });
  }
  return list;
}

// ── RENDER CATALOG ───────────────────────────────
function renderCatalog() {
  const list = getFiltered();
  const grid = document.getElementById('catalogGrid');
  const rc   = document.getElementById('resultsCount');
  if (rc) rc.textContent = `${list.length} mẫu xe`;
  if (!list.length) {
    grid.innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div><div>Không tìm thấy xe phù hợp</div></div>`;
    return;
  }
  grid.innerHTML = list.map((v,i) => renderCard(v,i)).join('');
}

function renderCard(v, i) {
  const pf   = v.specs.performance.fields;
  const bt   = v.specs.battery.fields;
  const ft   = v.specs.features.fields;
  const chips = [];
  if (ft.waterproof?.value)          chips.push({icon:'🛡',t:ft.waterproof.value});
  if (ft.esim?.value===true)         chips.push({icon:'📶',t:'eSIM 4G'});
  if (ft.gps?.value===true)          chips.push({icon:'🗺',t:'GPS'});
  if (bt.removable?.value===true)    chips.push({icon:'🔋',t:'Pin tháo rời'});
  if (ft.smartLock?.value)           chips.push({icon:'🔒',t:ft.smartLock.value});
  const stars = '★'.repeat(Math.round(v.rating?.score||0))+'☆'.repeat(5-Math.round(v.rating?.score||0));
  return `
  <div class="vcard brand-${v.brand} fade-up" style="animation-delay:${i*.05}s" onclick="showDetail('${v.id}')">
    <div class="vcard-img">
      ${v.images?.main
        ? `<img src="${v.images.main}" alt="${v.fullName}" style="width:100%;height:100%;object-fit:contain;padding:16px;transition:transform .5s ease" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">`
        : ''}
      <div class="vcard-img-icon" style="${v.images?.main ? 'display:none' : ''}">🛵</div>
      <div class="vcard-badges">${(v.badges||[]).map(b=>`<span class="vbadge ${badgeClass(b)}">${b}</span>`).join('')}</div>
      <span class="brand-tag">${v.brand.toUpperCase()}</span>
    </div>
    <div class="vcard-body">
      <div class="vcard-series">${v.series}</div>
      <div class="vcard-name">${v.fullName}</div>
      <div class="vcard-tagline">${v.tagline}</div>
      <div class="vcard-price">${fmtPrice(v.pricing.base)}</div>
      <div class="vcard-specs">
        <div class="vspec"><div class="vspec-label">Tốc độ tối đa</div><div class="vspec-value">${pf.topSpeed?.value||'—'} km/h</div></div>
        <div class="vspec"><div class="vspec-label">Quãng đường</div><div class="vspec-value">${pf.range?.value||'—'} km</div></div>
        <div class="vspec"><div class="vspec-label">Pin</div><div class="vspec-value">${bt.voltage?.value||'—'}V/${bt.capacity?.value||'—'}Ah</div></div>
        <div class="vspec"><div class="vspec-label">Động cơ</div><div class="vspec-value">${pf.motorPower?.value||'—'} W</div></div>
      </div>
      ${chips.length?`<div class="vcard-chips">${chips.slice(0,4).map(c=>`<span class="vchip">${c.icon} ${c.t}</span>`).join('')}</div>`:''}
    </div>
    <div class="vcard-footer">
      <div class="vrating">
        <span class="rating-stars">${stars}</span>
        <span class="rating-text">${v.rating?.score||'—'} (${new Intl.NumberFormat('vi-VN').format(v.rating?.count||0)})</span>
      </div>
      <button class="btn-view">Xem chi tiết →</button>
    </div>
  </div>`;
}

// ── DETAIL ───────────────────────────────────────
function showDetail(id) {
  const v = DB.vehicles.find(x=>x.id===id);
  if (!v) return;
  const brand = DB.brands[v.brand];
  const ac    = brand.accentColor;
  const pf    = v.specs.performance.fields;
  const bt    = v.specs.battery.fields;
  const dim   = v.specs.dimensions.fields;
  const war   = v.specs.warranty.fields;
  const ft    = v.specs.features.fields;

  document.getElementById('view-catalog').style.display = 'none';
  document.getElementById('view-detail').style.display = 'block';
  window.scrollTo(0,0);

  const specSections = Object.entries(v.specs);
  const tabsHTML   = specSections.map(([k,s],i)=>`<button class="spec-tab ${i===0?'active':''}" id="tab-${k}" onclick="switchTab('${k}')">${s.label}</button>`).join('');
  const panelsHTML = specSections.map(([k,s],i)=>`
    <div class="specs-panel ${i===0?'active':''}" id="panel-${k}">
      <table class="specs-table">
        ${Object.values(s.fields).map(f=>`<tr><td>${f.label}</td><td>${fmtVal(f)}</td></tr>`).join('')}
      </table>
    </div>`).join('');

  document.getElementById('detailContent').innerHTML = `
  <div class="detail-layout brand-${v.brand}">
    <div class="detail-left">
      <div class="detail-brand-line">
        <span class="detail-series-tag" style="background:${ac}18;color:${ac}">${v.brand.toUpperCase()} · ${v.series}</span>
        <div class="detail-badges-row">${(v.badges||[]).map(b=>`<span class="vbadge ${badgeClass(b)}">${b}</span>`).join('')}</div>
      </div>
      <h1 class="detail-name" style="color:${ac}">${v.fullName}</h1>
      <p class="detail-tagline">${v.tagline}</p>
      <p class="detail-desc">${v.description}</p>

      <div class="detail-media brand-${v.brand}">
        <div class="detail-media-main" style="position:relative;overflow:hidden">
          ${v.images?.main ? `<img src="${v.images.main}" alt="${v.fullName}" style="width:100%;height:100%;object-fit:contain;padding:24px;position:absolute;inset:0" onerror="this.style.display='none'">` : ''}
          <span style="font-size:10rem;opacity:.15">🛵</span>
        </div>
        ${v.images?.colors?.length ? `
        <div class="detail-colors-bar">
          <span class="colors-label">Màu sắc</span>
          <div class="color-swatches">
            ${v.images.colors.map((c,i)=>`<div class="cswatch ${i===0?'active':''}" style="background:${c.hex}" title="${c.name}" onclick="pickColor(this,'${c.name}')"></div>`).join('')}
          </div>
          <span class="color-name-label" id="colorLabel">${v.images.colors[0]?.name||''}</span>
        </div>` : ''}
      </div>

      <div class="section-heading">✨ Tính năng nổi bật</div>
      <div class="highlights-grid brand-${v.brand}">
        ${(v.highlights||[]).map(h=>`<div class="highlight-item"><span class="hi-dot"></span><span>${h}</span></div>`).join('')}
      </div>

      ${(v.pros?.length||v.cons?.length) ? `
      <div class="pros-cons">
        <div class="pc-box pros"><div class="pc-title">👍 Ưu điểm</div><ul class="pc-list pros">${(v.pros||[]).map(p=>`<li>${p}</li>`).join('')}</ul></div>
        <div class="pc-box cons"><div class="pc-title">👎 Nhược điểm</div><ul class="pc-list cons">${(v.cons||[]).map(c=>`<li>${c}</li>`).join('')}</ul></div>
      </div>` : ''}

      <div class="section-heading">🔧 Thông số kỹ thuật</div>
      <div class="spec-tabs">${tabsHTML}</div>
      <div>${panelsHTML}</div>
    </div>

    <div class="detail-right">
      <div class="sticky-card brand-${v.brand}">
        <div class="sticky-price">${fmtPrice(v.pricing.base)}</div>
        <div class="sticky-note">${v.pricing?.note||'Giá tham khảo'}</div>
        <div class="sticky-specs">
          <div class="ss-row"><span class="ss-label">⚡ Tốc độ tối đa</span><span class="ss-val">${pf.topSpeed?.value||'—'} km/h</span></div>
          <div class="ss-row"><span class="ss-label">📏 Quãng đường/sạc</span><span class="ss-val">${pf.range?.value||'—'} km</span></div>
          <div class="ss-row"><span class="ss-label">🔋 Pin</span><span class="ss-val">${bt.voltage?.value||'—'}V / ${bt.capacity?.value||'—'}Ah</span></div>
          <div class="ss-row"><span class="ss-label">⏱ Sạc đầy</span><span class="ss-val">${bt.chargeTimeFull?.value||'—'} giờ</span></div>
          <div class="ss-row"><span class="ss-label">🏋 Trọng lượng</span><span class="ss-val">${dim.weight?.value||'—'} kg</span></div>
          <div class="ss-row"><span class="ss-label">🛡 Chống nước</span><span class="ss-val">${ft.waterproof?.value||'—'}</span></div>
        </div>
        <div class="sticky-divider"></div>
        <div class="warranty-block">
          <div class="warranty-title">🛠 Bảo hành</div>
          ${Object.values(war).map(f=>`
            <div class="warranty-row">
              <span>${f.label}</span>
              <span>${f.value||'—'}</span>
            </div>`).join('')}
        </div>
      </div>
    </div>
  </div>`;

  const related = DB.vehicles.filter(x=>x.id!==id)
    .filter(x=>x.brand===v.brand||Math.abs((x.pricing.base||0)-(v.pricing.base||0))<15000000)
    .slice(0,3);
  document.getElementById('relatedWrap').innerHTML = related.length ? `
    <h2 class="related-title">Xe tương tự</h2>
    <div class="related-grid">${related.map((r,i)=>renderCard(r,i)).join('')}</div>` : '';
}

function switchTab(k) {
  document.querySelectorAll('.spec-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.specs-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+k)?.classList.add('active');
  document.getElementById('panel-'+k)?.classList.add('active');
}
function pickColor(el, name) {
  document.querySelectorAll('.cswatch').forEach(s=>s.classList.remove('active'));
  el.classList.add('active');
  const lbl = document.getElementById('colorLabel');
  if (lbl) lbl.textContent = name;
}
function showCatalog() {
  document.getElementById('view-catalog').style.display = 'block';
  document.getElementById('view-detail').style.display = 'none';
  window.scrollTo(0,0);
}

// ── SEARCH ───────────────────────────────────────
function initSearch() {
  const inp  = document.getElementById('searchInput');
  const drop = document.getElementById('searchDrop');
  inp.addEventListener('input', ()=>{
    const q = inp.value.toLowerCase().trim();
    if (!q||!DB) { drop.classList.remove('open'); return; }
    const res = DB.vehicles.filter(v=>
      v.fullName.toLowerCase().includes(q)||
      v.brand.includes(q)||
      v.series.toLowerCase().includes(q)||
      (v.tags||[]).some(t=>t.includes(q))
    ).slice(0,6);
    if (!res.length) { drop.classList.remove('open'); return; }
    drop.innerHTML = res.map(v=>{
      const ac = DB.brands[v.brand].accentColor;
      return `<div class="sdrop-item" onclick="showDetail('${v.id}');inp.value='';drop.classList.remove('open')">
        <span class="sdrop-brand" style="background:${ac}18;color:${ac}">${v.brand.toUpperCase()}</span>
        <div>
          <div class="sdrop-name">${v.fullName}</div>
          <div class="sdrop-meta">${fmtPrice(v.pricing.base)} · ${v.specs.performance.fields.range?.value||'—'}km · ${v.specs.performance.fields.topSpeed?.value||'—'}km/h</div>
        </div>
      </div>`;
    }).join('');
    drop.classList.add('open');
  });
  document.addEventListener('click', e=>{
    if (!inp.contains(e.target)&&!drop.contains(e.target)) drop.classList.remove('open');
  });
}
